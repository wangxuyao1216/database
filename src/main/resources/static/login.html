<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火车售票管理系统</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #f4f6f8;
            --panel: #ffffff;
            --line: #d8e0e8;
            --text: #18212f;
            --muted: #667384;
            --primary: #1463a5;
            --primary-weak: #e7f1fb;
            --accent: #237b5b;
            --warn: #b45309;
            --danger: #b42318;
            --shadow: 0 10px 28px rgba(27, 39, 54, .08);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        button, input, select {
            font: inherit;
        }

        button {
            min-height: 36px;
            border: 0;
            border-radius: 6px;
            color: #fff;
            background: var(--primary);
            cursor: pointer;
        }

        button:hover {
            filter: brightness(.96);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: .48;
        }

        button.secondary {
            color: var(--primary);
            border: 1px solid #b9d4ed;
            background: var(--primary-weak);
        }

        button.ghost {
            color: var(--muted);
            border: 1px solid var(--line);
            background: #fff;
        }

        button.danger {
            background: var(--danger);
        }

        input, select {
            width: 100%;
            min-height: 38px;
            padding: 8px 10px;
            border: 1px solid #c8d2dd;
            border-radius: 6px;
            color: var(--text);
            background: #fff;
        }

        input:focus, select:focus {
            outline: 2px solid rgba(20, 99, 165, .18);
            border-color: var(--primary);
        }

        label {
            display: block;
            margin: 0 0 6px;
            font-size: 13px;
            color: var(--muted);
        }

        .app-shell {
            min-height: 100vh;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            min-height: 68px;
            padding: 0 28px;
            color: #fff;
            background: #123e68;
        }

        .brand {
            display: flex;
            align-items: center;
            min-width: 220px;
        }

        .brand h1 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 0;
        }

        .session {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, .9);
            font-size: 14px;
        }

        .layout {
            display: grid;
            grid-template-columns: 210px 1fr;
            min-height: calc(100vh - 68px);
        }

        .sidebar {
            padding: 18px 14px;
            border-right: 1px solid var(--line);
            background: #fff;
        }

        .nav-button {
            display: flex;
            align-items: center;
            width: 100%;
            margin: 0 0 8px;
            padding: 10px 14px;
            color: var(--text);
            text-align: left;
            background: transparent;
        }

        .nav-button.active {
            color: var(--primary);
            background: var(--primary-weak);
        }

        .content {
            padding: 22px;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .work-grid {
            display: grid;
            grid-template-columns: minmax(340px, 420px) minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }

        .section {
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .section + .section {
            margin-top: 16px;
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }

        h2 {
            margin: 0;
            font-size: 18px;
        }

        h3 {
            margin: 0 0 12px;
            font-size: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .field {
            position: relative;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .actions button {
            min-width: 110px;
            padding: 0 14px;
        }

        .switcher {
            display: inline-flex;
            gap: 6px;
            padding: 4px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }

        .switcher button {
            min-width: 92px;
            color: var(--muted);
            background: transparent;
        }

        .switcher button.active {
            color: #fff;
            background: var(--primary);
        }

        .suggestions {
            position: absolute;
            z-index: 20;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            max-height: 220px;
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: var(--shadow);
        }

        .suggestion {
            width: 100%;
            min-height: auto;
            padding: 9px 10px;
            border-radius: 0;
            color: var(--text);
            text-align: left;
            background: #fff;
        }

        .suggestion:hover {
            background: var(--primary-weak);
        }

        .suggestion small {
            display: block;
            margin-top: 2px;
            color: var(--muted);
        }

        .table-wrap {
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            background: #fff;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #e7edf3;
            text-align: left;
            white-space: nowrap;
        }

        th {
            color: var(--muted);
            font-weight: 600;
            background: #f7fafc;
        }

        tr.selected {
            background: #eaf6f1;
        }

        .empty {
            padding: 28px 16px;
            color: var(--muted);
            text-align: center;
        }

        .seat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
            gap: 10px;
        }

        .seat {
            min-height: 62px;
            padding: 8px;
            border: 1px solid #b8d5c9;
            color: #154734;
            background: #eef8f3;
        }

        .seat.selected {
            color: #fff;
            border-color: var(--accent);
            background: var(--accent);
        }

        .seat strong {
            display: block;
            font-size: 16px;
        }

        .seat span {
            display: block;
            margin-top: 3px;
            font-size: 12px;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 14px;
        }

        .metric {
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }

        .metric span {
            color: var(--muted);
            font-size: 13px;
        }

        .metric strong {
            display: block;
            margin-top: 6px;
            font-size: 23px;
        }

        .message {
            min-height: 22px;
            margin-top: 12px;
            color: var(--primary);
            word-break: break-word;
        }

        .message.error {
            color: var(--danger);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 0 8px;
            border-radius: 999px;
            color: var(--primary);
            background: var(--primary-weak);
            font-size: 12px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 980px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: flex;
                gap: 8px;
                overflow-x: auto;
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .nav-button {
                width: auto;
                white-space: nowrap;
            }

            .work-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
                padding: 14px 18px;
            }

            .content {
                padding: 14px;
            }

            .form-grid, .metrics {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <!-- 顶部标题栏：展示系统名称和当前登录状态 -->
    <header class="topbar">
        <div class="brand">
            <h1>火车售票管理系统</h1>
        </div>
        <div class="session">
            <span id="sessionText">未登录</span>
            <button class="secondary hidden" id="quickLogout" type="button">退出</button>
        </div>
    </header>

    <div class="layout">
        <!-- 左侧导航栏：切换售票、统计、账号、用户和备份功能 -->
        <aside class="sidebar">
            <button class="nav-button active" data-panel="ticketPanel" type="button">售票</button>
            <button class="nav-button" data-panel="ordersPanel" type="button">订单</button>
            <button class="nav-button" data-panel="statsPanel" type="button">统计</button>
            <button class="nav-button" data-panel="accountPanel" type="button">账号</button>
            <button class="nav-button" data-panel="usersPanel" type="button">用户</button>
            <button class="nav-button" data-panel="backupPanel" type="button">备份</button>
        </aside>

        <main class="content">
            <!-- 售票面板：完成车站搜索、车次查询、选座和购票提交 -->
            <section class="panel active" id="ticketPanel">
                <div class="work-grid">
                    <div>
                        <div class="section">
                            <div class="section-head">
                                <h2>车票查询</h2>
                                <span class="badge" id="selectedRouteBadge">未选择线路</span>
                            </div>
                            <form id="trainSearchForm">
                                <div class="form-grid">
                                    <div class="field">
                                        <label for="fromStationInput">出发站</label>
                                        <input id="fromStationInput" autocomplete="off" placeholder="上海">
                                        <div class="suggestions hidden" id="fromSuggestions"></div>
                                    </div>
                                    <div class="field">
                                        <label for="toStationInput">到达站</label>
                                        <input id="toStationInput" autocomplete="off" placeholder="北京">
                                        <div class="suggestions hidden" id="toSuggestions"></div>
                                    </div>
                                    <div>
                                        <label for="travelDate">出发日期</label>
                                        <input id="travelDate" type="date" required>
                                    </div>
                                    <div>
                                        <label for="trainType">车次类型</label>
                                        <select id="trainType">
                                            <option value="">全部</option>
                                            <option value="G">高铁 G</option>
                                            <option value="D">动车 D</option>
                                            <option value="T">特快 T</option>
                                            <option value="K">快速 K</option>
                                            <option value="Z">直达 Z</option>
                                            <option value="C">城际 C</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="actions">
                                    <button type="submit">查询车次</button>
                                    <button class="ghost" id="swapStations" type="button">交换</button>
                                </div>
                            </form>
                            <div class="message" id="ticketMessage"></div>
                        </div>

                        <div class="section">
                            <div class="section-head">
                                <h2>车次列表</h2>
                                <span class="badge" id="trainCount">0 班</span>
                            </div>
                            <div class="table-wrap" id="trainTableWrap">
                                <div class="empty">暂无车次</div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="section">
                            <div class="section-head">
                                <h2>座位选择</h2>
                                <span class="badge" id="seatCount">0 座</span>
                            </div>
                            <div class="seat-grid" id="seatGrid"></div>
                            <div class="empty" id="seatEmpty">请选择车次</div>
                        </div>

                        <div class="section">
                            <div class="section-head">
                                <h2>经停站</h2>
                                <span class="badge" id="routeCount">0 站</span>
                            </div>
                            <div class="table-wrap" id="routeTableWrap">
                                <div class="empty">请选择车次后查看经停站</div>
                            </div>
                        </div>

                        <div class="section">
                            <div class="section-head">
                                <h2>乘车人</h2>
                                <span class="badge" id="bookingState">待提交</span>
                            </div>
                            <form id="bookForm">
                                <div class="form-grid">
                                    <div>
                                        <label for="passengerName">姓名</label>
                                        <input id="passengerName" required>
                                    </div>
                                    <div>
                                        <label for="passengerIdNumber">身份证号</label>
                                        <input id="passengerIdNumber" required maxlength="18">
                                    </div>
                                    <div>
                                        <label for="ticketPrice">票价</label>
                                        <input id="ticketPrice" type="number" min="0" step="0.01" value="128.00" required>
                                    </div>
                                    <div>
                                        <label for="selectedSeatText">座位</label>
                                        <input id="selectedSeatText" readonly placeholder="未选择">
                                    </div>
                                </div>
                                <div class="actions">
                                    <button id="bookButton" type="submit" disabled>提交购票</button>
                                    <button class="ghost" id="clearBooking" type="button">清空</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 订单面板：查看我的订单，并对有效车票发起退票 -->
            <section class="panel" id="ordersPanel">
                <div class="section">
                    <div class="section-head">
                        <h2>我的订单</h2>
                        <div class="actions" style="margin-top:0">
                            <button type="button" id="refreshOrders">刷新订单</button>
                            <button class="ghost" type="button" id="prevOrders">上一页</button>
                            <button class="ghost" type="button" id="nextOrders">下一页</button>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div>
                            <label for="orderPageSize">每页条数</label>
                            <select id="orderPageSize">
                                <option value="5">5</option>
                                <option value="10" selected>10</option>
                                <option value="20">20</option>
                            </select>
                        </div>
                        <div>
                            <label for="orderStatusFilter">状态筛选</label>
                            <select id="orderStatusFilter">
                                <option value="">全部</option>
                                <option value="VALID">有效</option>
                                <option value="REFUNDED">已退票</option>
                                <option value="CANCELLED">已取消</option>
                                <option value="USED">已使用</option>
                            </select>
                        </div>
                    </div>
                    <div class="table-wrap" style="margin-top:14px">
                        <table id="ordersTable"></table>
                    </div>
                    <div class="message" id="ordersMessage"></div>
                </div>
            </section>

            <!-- 统计面板：展示窗口函数统计接口返回的数据 -->
            <section class="panel" id="statsPanel">
                <div class="metrics">
                    <div class="metric"><span>接口状态</span><strong id="apiState">待请求</strong></div>
                    <div class="metric"><span>展示条数</span><strong id="rowCount">0</strong></div>
                    <div class="metric"><span>登录用户</span><strong id="currentUser">未登录</strong></div>
                </div>
                <div class="section">
                    <div class="section-head">
                        <h2>业务统计</h2>
                        <div class="actions" style="margin-top:0">
                            <button type="button" data-stat="route">线路排行</button>
                            <button type="button" data-stat="user">用户排行</button>
                            <button type="button" data-stat="trend">车次趋势</button>
                        </div>
                    </div>
                    <div class="table-wrap">
                        <table id="statsTable"></table>
                    </div>
                    <div class="message" id="statsMessage"></div>
                </div>
            </section>

            <!-- 账号面板：登录、注册、修改个人信息和注销账号 -->
            <section class="panel" id="accountPanel">
                <div class="section" id="authEntrySection">
                    <div class="section-head">
                        <h2>账号入口</h2>
                        <div class="switcher">
                            <button class="active" data-auth-view="loginSection" type="button">登录</button>
                            <button data-auth-view="registerSection" type="button">注册</button>
                        </div>
                    </div>

                    <div id="loginSection">
                        <div class="section-head">
                            <h2>登录</h2>
                        </div>
                        <form id="loginForm">
                            <div class="form-grid">
                                <div class="field full">
                                    <label for="loginUsername">用户名</label>
                                    <input id="loginUsername" name="username" value="admin" autocomplete="username">
                                </div>
                                <div class="field full">
                                    <label for="loginPassword">密码</label>
                                    <input id="loginPassword" name="password" type="password" value="123456" autocomplete="current-password">
                                </div>
                            </div>
                            <div class="actions">
                                <button type="submit">登录</button>
                            </div>
                        </form>
                    </div>

                    <div id="registerSection" class="hidden">
                        <div class="section-head">
                            <h2>注册</h2>
                        </div>
                        <form id="registerForm">
                            <div class="form-grid">
                                <div>
                                    <label for="regUsername">用户名</label>
                                    <input id="regUsername" name="username" required>
                                </div>
                                <div>
                                    <label for="regPassword">密码</label>
                                    <input id="regPassword" name="password" type="password" required>
                                </div>
                                <div>
                                    <label for="regRealName">真实姓名</label>
                                    <input id="regRealName" name="realName" required>
                                </div>
                                <div>
                                    <label for="regIdNumber">身份证号</label>
                                    <input id="regIdNumber" name="idNumber" required maxlength="18">
                                </div>
                                <div>
                                    <label for="regPhone">手机号</label>
                                    <input id="regPhone" name="phone" required>
                                </div>
                                <div>
                                    <label for="regUserType">用户类型</label>
                                    <select id="regUserType" name="userType">
                                        <option value="USER">普通用户</option>
                                        <option value="STAFF">工作人员</option>
                                        <option value="ADMIN">管理员</option>
                                    </select>
                                </div>
                            </div>
                            <div class="actions">
                                <button type="submit">注册</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="section">
                    <div class="section-head">
                        <h2>个人信息</h2>
                    </div>
                    <form id="profileForm">
                        <div class="form-grid">
                            <div>
                                <label for="profileUsername">用户名</label>
                                <input id="profileUsername" name="username">
                            </div>
                            <div>
                                <label for="profilePassword">密码</label>
                                <input id="profilePassword" name="password" type="password">
                            </div>
                            <div>
                                <label for="profilePhone">手机号</label>
                                <input id="profilePhone" name="phone">
                            </div>
                            <div>
                                <label for="profileEmail">邮箱</label>
                                <input id="profileEmail" name="email" type="email">
                            </div>
                        </div>
                        <div class="actions">
                            <button type="submit">更新</button>
                        </div>
                    </form>
                    <div class="actions">
                        <button class="danger" id="deleteAccount" type="button">注销账号</button>
                    </div>
                    <div class="message" id="accountMessage"></div>
                </div>
            </section>

            <!-- 用户管理面板：管理员查询和删除用户 -->
            <section class="panel" id="usersPanel">
                <div class="section">
                    <div class="section-head">
                        <h2>用户管理</h2>
                    </div>
                    <form id="userSearchForm">
                        <div class="form-grid">
                            <div>
                                <label for="userSearchName">用户名</label>
                                <input id="userSearchName" name="username">
                            </div>
                            <div>
                                <label for="userRealName">真实姓名</label>
                                <input id="userRealName" name="realName">
                            </div>
                            <div>
                                <label for="userTypeFilter">用户类型</label>
                                <select id="userTypeFilter" name="userType">
                                    <option value="">全部</option>
                                    <option value="ADMIN">管理员</option>
                                    <option value="STAFF">工作人员</option>
                                    <option value="USER">普通用户</option>
                                </select>
                            </div>
                            <div>
                                <label for="userStatusFilter">状态</label>
                                <select id="userStatusFilter" name="status">
                                    <option value="">全部</option>
                                    <option value="1">正常</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                        </div>
                        <div class="actions">
                            <button type="submit">查询</button>
                            <button class="ghost" id="clearUserSearch" type="button">清空</button>
                        </div>
                    </form>
                    <div class="table-wrap" style="margin-top:14px">
                        <table id="userTable"></table>
                    </div>
                    <div class="message" id="userMessage"></div>
                </div>
            </section>

            <!-- 数据库备份面板：创建备份、刷新列表和恢复备份 -->
            <section class="panel" id="backupPanel">
                <div class="section">
                    <div class="section-head">
                        <h2>数据库备份</h2>
                        <div class="actions" style="margin-top:0">
                            <button type="button" id="createBackup">创建备份</button>
                            <button class="secondary" type="button" id="loadBackups">刷新</button>
                            <button class="danger" type="button" id="restoreBackup">恢复</button>
                        </div>
                    </div>
                    <label for="backupSelect">备份文件</label>
                    <select id="backupSelect"></select>
                    <div class="table-wrap" style="margin-top:14px">
                        <table id="backupTable"></table>
                    </div>
                    <div class="message" id="backupMessage"></div>
                </div>
            </section>
        </main>
    </div>
</div>

<script>
    // 页面运行状态：保存登录信息、当前路线、已选车次和已选座位
    const state = {
        token: localStorage.getItem("token") || "",
        username: localStorage.getItem("username") || "",
        id: localStorage.getItem("userId") || "",
        userType: localStorage.getItem("userType") || "",
        route: { from: null, to: null },
        selectedTrain: null,
        selectedSeat: null,
        orders: { page: 1, size: 10, totalPages: 1 },
        stationTimers: {}
    };

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => Array.from(document.querySelectorAll(selector));

    // 默认查询日期使用当天
    function today() {
        return new Date().toISOString().slice(0, 10);
    }

    // 统一显示页面提示信息
    function setMessage(el, text, ok = true) {
        if (!el) return;
        el.textContent = text || "";
        el.classList.toggle("error", !ok);
    }

    function updateSession() {
        $("#sessionText").textContent = state.username ? `${state.username} 已登录` : "未登录";
        $("#currentUser").textContent = state.username || "未登录";
        $("#quickLogout").classList.toggle("hidden", !state.username);
        $("#authEntrySection").classList.toggle("hidden", Boolean(state.token));
        if (state.username && !$("#profileUsername").value) {
            $("#profileUsername").value = state.username;
        }
    }

    function fillProfileForm(user = {}) {
        $("#profileUsername").value = user.username || state.username || "";
        $("#profilePhone").value = user.phone || "";
        $("#profileEmail").value = user.email || "";
        $("#profilePassword").value = "";
        if (user.username) {
            state.username = user.username;
            localStorage.setItem("username", user.username);
        }
        if (user.userType) {
            state.userType = user.userType;
            localStorage.setItem("userType", user.userType);
        }
        updateSession();
    }

    function clearProfileForm() {
        $("#profileUsername").value = "";
        $("#profilePassword").value = "";
        $("#profilePhone").value = "";
        $("#profileEmail").value = "";
    }

    // 解析 JWT 内容，用于保存用户身份信息
    function parseJwtPayload(token) {
        if (!token || token.split(".").length < 2) return {};
        try {
            const payload = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
            const padded = payload.padEnd(payload.length + (4 - payload.length % 4) % 4, "=");
            return JSON.parse(decodeURIComponent(escape(atob(padded))));
        } catch (error) {
            return {};
        }
    }

    function persistLogin(data) {
        const claims = parseJwtPayload(data.token);
        state.token = data.token || "";
        state.username = data.username || claims.username || "";
        state.id = String(data.id || claims.id || "");
        state.userType = claims.userType || data.userType || "";
        localStorage.setItem("token", state.token);
        localStorage.setItem("username", state.username);
        localStorage.setItem("userId", state.id);
        localStorage.setItem("userType", state.userType);
        fillProfileForm(data);
        updateSession();
    }

    async function loadCurrentUserProfile() {
        if (!state.token) {
            clearProfileForm();
            return;
        }
        const user = await request("/api/users/me");
        fillProfileForm(user || {});
    }

    // 退出登录并清除本地保存的身份信息
    function logout() {
        state.token = "";
        state.username = "";
        state.id = "";
        state.userType = "";
        state.orders = { page: 1, size: 10, totalPages: 1 };
        localStorage.removeItem("token");
        localStorage.removeItem("username");
        localStorage.removeItem("userId");
        localStorage.removeItem("userType");
        clearProfileForm();
        updateSession();
        switchAuthView("loginSection");
        $("#ordersTable").innerHTML = "<tbody><tr><td>请先登录</td></tr></tbody>";
        setMessage($("#ordersMessage"), "");
        setMessage($("#accountMessage"), "已退出登录");
    }

    function formJson(form) {
        return Object.fromEntries(new FormData(form).entries());
    }

    function queryString(data) {
        const params = new URLSearchParams();
        Object.entries(data).forEach(([key, value]) => {
            if (value !== undefined && value !== null && value !== "") {
                params.set(key, value);
            }
        });
        return params.toString();
    }

    // 统一封装 fetch：自动携带 token，并处理后端 Result 结构
    async function request(path, options = {}) {
        const headers = { ...(options.headers || {}) };
        if (!(options.body instanceof FormData)) {
            headers["Content-Type"] = headers["Content-Type"] || "application/json";
        }
        if (state.token) {
            headers.token = state.token;
        }
        const response = await fetch(path, { ...options, headers });
        if (response.status === 401) {
            throw new Error("登录已失效");
        }
        const result = await response.json();
        if (result.code !== 1) {
            throw new Error(result.msg || "请求失败");
        }
        return result.data;
    }

    // 通用表格渲染，用于统计和备份列表
    function renderGenericTable(table, rows) {
        if (!rows || rows.length === 0) {
            table.innerHTML = "<tbody><tr><td>暂无数据</td></tr></tbody>";
            $("#rowCount").textContent = "0";
            return;
        }
        const columns = Object.keys(rows[0]);
        table.innerHTML = `
            <thead><tr>${columns.map(column => `<th>${column}</th>`).join("")}</tr></thead>
            <tbody>
                ${rows.map(row => `
                    <tr>${columns.map(column => `<td>${row[column] ?? ""}</td>`).join("")}</tr>
                `).join("")}
            </tbody>
        `;
        $("#rowCount").textContent = rows.length;
    }

    // 把车站对象格式化成前端展示文本
    function stationLabel(station) {
        if (!station) return "";
        const code = station.stationCode ? ` ${station.stationCode}` : "";
        const city = station.city ? ` · ${station.city}` : "";
        return `${station.stationName || ""}${code}${city}`;
    }

    // 车站输入防抖，避免用户每输入一个字就立即请求后端
    function debounceStationSearch(kind, keyword) {
        clearTimeout(state.stationTimers[kind]);
        state.stationTimers[kind] = setTimeout(() => searchStations(kind, keyword), 220);
    }

    // 调用车站搜索接口，并渲染下拉候选项
    async function searchStations(kind, keyword) {
        const box = kind === "from" ? $("#fromSuggestions") : $("#toSuggestions");
        if (!keyword || keyword.trim().length < 1) {
            box.classList.add("hidden");
            box.innerHTML = "";
            return;
        }
        try {
            const rows = await request(`/api/stations/search?keyword=${encodeURIComponent(keyword.trim())}`);
            if (!rows || rows.length === 0) {
                box.innerHTML = `<button class="suggestion" type="button">无匹配车站</button>`;
                box.classList.remove("hidden");
                return;
            }
            box.innerHTML = rows.slice(0, 12).map((station, index) => `
                <button class="suggestion" type="button" data-kind="${kind}" data-index="${index}">
                    ${station.stationName || ""}
                    <small>${station.city || ""} ${station.province || ""} ${station.stationCode || ""}</small>
                </button>
            `).join("");
            box._stations = rows.slice(0, 12);
            box.classList.remove("hidden");
        } catch (error) {
            setMessage($("#ticketMessage"), error.message, false);
        }
    }

    function selectStation(kind, station) {
        state.route[kind] = station;
        const input = kind === "from" ? $("#fromStationInput") : $("#toStationInput");
        const box = kind === "from" ? $("#fromSuggestions") : $("#toSuggestions");
        input.value = station.stationName || "";
        box.classList.add("hidden");
        updateRouteBadge();
    }

    function updateRouteBadge() {
        const from = state.route.from?.stationName || "出发站";
        const to = state.route.to?.stationName || "到达站";
        $("#selectedRouteBadge").textContent = `${from} → ${to}`;
    }

    function renderTrainTable(rows) {
        $("#trainCount").textContent = `${rows.length} 班`;
        state.selectedTrain = null;
        state.selectedSeat = null;
        resetSeats();
        updateBookButton();
        if (!rows.length) {
            $("#trainTableWrap").innerHTML = `<div class="empty">暂无车次</div>`;
            return;
        }
        $("#trainTableWrap").innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>车次</th>
                        <th>出发</th>
                        <th>到达</th>
                        <th>余票</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    ${rows.map((train, index) => `
                        <tr data-train-index="${index}">
                            <td><strong>${train.trainNumber || ""}</strong><br><span class="badge">${train.trainType || ""}</span></td>
                            <td>${train.fromStationName || ""}<br>${train.departureTime || ""}</td>
                            <td>${train.toStationName || ""}<br>${train.arrivalTime || ""}</td>
                            <td>${train.availableSeats ?? 0}/${train.totalSeats ?? 0}</td>
                            <td>
                                <button class="secondary" type="button" data-select-train="${index}">选座</button>
                                <button class="ghost" type="button" data-route-train="${index}">经停站</button>
                            </td>
                        </tr>
                    `).join("")}
                </tbody>
            </table>
        `;
        $("#trainTableWrap")._trains = rows;
    }

    // 根据选择的路线、日期和车次类型查询可售车次
    async function searchTrains() {
        if (!state.route.from || !state.route.to) {
            setMessage($("#ticketMessage"), "请选择出发站和到达站", false);
            return;
        }
        const params = queryString({
            fromStationId: state.route.from.id,
            toStationId: state.route.to.id,
            date: $("#travelDate").value,
            trainType: $("#trainType").value
        });
        try {
            setMessage($("#ticketMessage"), "正在查询车次");
            const rows = await request(`/api/trains/search?${params}`);
            renderTrainTable(rows || []);
            setMessage($("#ticketMessage"), `查询完成，共 ${rows?.length || 0} 班`);
        } catch (error) {
            setMessage($("#ticketMessage"), error.message, false);
        }
    }

    function resetSeats() {
        $("#seatGrid").innerHTML = "";
        $("#seatEmpty").classList.remove("hidden");
        $("#seatEmpty").textContent = "请选择车次";
        $("#seatCount").textContent = "0 座";
        $("#selectedSeatText").value = "";
        $("#bookingState").textContent = "待提交";
        $("#routeTableWrap").innerHTML = `<div class="empty">请选择车次后查看经停站</div>`;
        $("#routeCount").textContent = "0 站";
    }

    async function selectTrain(index) {
        const rows = $("#trainTableWrap")._trains || [];
        const train = rows[index];
        if (!train) return;
        state.selectedTrain = train;
        state.selectedSeat = null;
        $$("[data-train-index]").forEach(row => row.classList.toggle("selected", Number(row.dataset.trainIndex) === index));
        loadRoute(train.trainId);
        try {
            setMessage($("#ticketMessage"), "正在查询座位");
            const seats = await request(`/api/trains/${train.scheduleId}/seats?${queryString({
                fromStationId: state.route.from.id,
                toStationId: state.route.to.id
            })}`);
            renderSeats(seats || []);
            setMessage($("#ticketMessage"), `${train.trainNumber} 可选座位 ${seats?.length || 0} 个`);
        } catch (error) {
            resetSeats();
            setMessage($("#ticketMessage"), error.message, false);
        }
        updateBookButton();
    }

    // 渲染指定车次的可用座位
    function renderSeats(seats) {
        $("#seatCount").textContent = `${seats.length} 座`;
        $("#seatEmpty").classList.toggle("hidden", seats.length > 0);
        if (!seats.length) {
            $("#seatEmpty").textContent = "暂无可用座位";
            $("#seatGrid").innerHTML = "";
            return;
        }
        $("#seatGrid").innerHTML = seats.map((seat, index) => `
            <button class="seat" type="button" data-seat-index="${index}">
                <strong>${seat.seatNumber || ""}</strong>
                <span>${seat.carriageNumber || ""}车 · ${seat.carriageType || ""}</span>
                <span>${seat.seatType || ""}</span>
            </button>
        `).join("");
        $("#seatGrid")._seats = seats;
    }

    function selectSeat(index) {
        const seat = ($("#seatGrid")._seats || [])[index];
        if (!seat) return;
        state.selectedSeat = seat;
        $$(".seat").forEach((item, itemIndex) => item.classList.toggle("selected", itemIndex === index));
        $("#selectedSeatText").value = `${seat.carriageNumber || ""}车 ${seat.seatNumber || ""} ${seat.carriageType || ""}`;
        $("#bookingState").textContent = "已选座";
        updateBookButton();
    }

    function updateBookButton() {
        $("#bookButton").disabled = !(state.token && state.selectedTrain && state.selectedSeat);
    }

    // 提交购票请求，后端会调用 sp_book_ticket 存储过程完成事务处理
    async function submitBooking() {
        if (!state.token) {
            setMessage($("#ticketMessage"), "请先登录", false);
            return;
        }
        if (!state.selectedTrain || !state.selectedSeat) {
            setMessage($("#ticketMessage"), "请选择车次和座位", false);
            return;
        }
        const payload = {
            scheduleId: state.selectedTrain.scheduleId,
            seatId: state.selectedSeat.seatId,
            carriageId: state.selectedSeat.carriageId,
            fromStationId: state.route.from.id,
            toStationId: state.route.to.id,
            passengerName: $("#passengerName").value.trim(),
            passengerIdNumber: $("#passengerIdNumber").value.trim(),
            ticketPrice: Number($("#ticketPrice").value),
            seatType: state.selectedSeat.carriageType || state.selectedSeat.seatType || "SECOND",
            scheduleDate: state.selectedTrain.scheduleDate || $("#travelDate").value
        };
        try {
            $("#bookingState").textContent = "提交中";
            const data = await request("/api/tickets", { method: "POST", body: JSON.stringify(payload) });
            $("#bookingState").textContent = "购票成功";
            setMessage($("#ticketMessage"), data?.resultMsg || "购票成功");
            await selectTrain(($("#trainTableWrap")._trains || []).indexOf(state.selectedTrain));
            await loadMyOrders(1);
        } catch (error) {
            $("#bookingState").textContent = "购票失败";
            setMessage($("#ticketMessage"), error.message, false);
        }
    }

    // 加载窗口函数统计结果
    async function loadRoute(trainId) {
        if (!trainId) {
            $("#routeTableWrap").innerHTML = `<div class="empty">暂无经停站数据</div>`;
            $("#routeCount").textContent = "0 站";
            return;
        }
        try {
            const rows = await request(`/api/trains/${trainId}/route`);
            renderRoute(rows || []);
        } catch (error) {
            $("#routeTableWrap").innerHTML = `<div class="empty">${error.message}</div>`;
            $("#routeCount").textContent = "0 站";
        }
    }

    function renderRoute(rows) {
        $("#routeCount").textContent = `${rows.length} 站`;
        if (!rows.length) {
            $("#routeTableWrap").innerHTML = `<div class="empty">暂无经停站数据</div>`;
            return;
        }
        $("#routeTableWrap").innerHTML = `
            <table>
                <thead>
                    <tr><th>序号</th><th>车站</th><th>到达</th><th>开车</th><th>停留</th></tr>
                </thead>
                <tbody>
                    ${rows.map(row => `
                        <tr>
                            <td>${row.stationOrder ?? ""}</td>
                            <td>${row.stationName ?? ""}</td>
                            <td>${row.arrivalTime ?? "-"}</td>
                            <td>${row.departureTime ?? "-"}</td>
                            <td>${row.stayMinutes ?? 0} 分钟</td>
                        </tr>
                    `).join("")}
                </tbody>
            </table>
        `;
    }

    function normalizeOrderStatus(status) {
        const value = String(status ?? "");
        const map = {
            VALID: "有效",
            REFUNDED: "已退票",
            CANCELLED: "已取消",
            USED: "已使用"
        };
        return map[value] || value || "未知";
    }

    function normalizeOrderList(data) {
        if (Array.isArray(data)) {
            return {list: data, total: data.length, page: 1, size: data.length || 10, totalPages: 1};
        }
        return {
            list: data?.list || [],
            total: data?.total || 0,
            page: data?.page || state.orders.page,
            size: data?.size || state.orders.size,
            totalPages: data?.totalPages || 1
        };
    }

    function orderValue(order, keys) {
        for (const key of keys) {
            if (order[key] !== undefined && order[key] !== null) {
                return order[key];
            }
        }
        return "";
    }

    async function loadMyOrders(page = state.orders.page) {
        if (!state.token) {
            setMessage($("#ordersMessage"), "请先登录后查看订单", false);
            $("#ordersTable").innerHTML = "<tbody><tr><td>请先登录</td></tr></tbody>";
            return;
        }
        state.orders.page = Math.max(1, page);
        state.orders.size = Number($("#orderPageSize").value || 10);
        const status = $("#orderStatusFilter").value;
        const query = queryString({
            page: state.orders.page,
            size: state.orders.size,
            status: status || undefined
        });
        try {
            const data = normalizeOrderList(await request(`/api/tickets/my-orders?${query}`));
            state.orders.page = data.page;
            state.orders.size = data.size;
            state.orders.totalPages = Math.max(1, data.totalPages);
            renderOrders(data.list);
            setMessage($("#ordersMessage"), `共 ${data.total} 条订单，第 ${data.page}/${state.orders.totalPages} 页`);
        } catch (error) {
            setMessage($("#ordersMessage"), error.message, false);
        }
    }

    function renderOrders(rows) {
        if (!rows || rows.length === 0) {
            $("#ordersTable").innerHTML = "<tbody><tr><td>暂无订单</td></tr></tbody>";
            return;
        }
        $("#ordersTable").innerHTML = `
            <thead>
                <tr>
                    <th>订单/票ID</th>
                    <th>车次</th>
                    <th>线路</th>
                    <th>日期</th>
                    <th>座位</th>
                    <th>乘车人</th>
                    <th>票价</th>
                    <th>状态</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                ${rows.map(order => {
                    const id = orderValue(order, ["id", "orderId", "ticketId"]);
                    const status = orderValue(order, ["ticketStatus", "ticket_status", "status"]);
                    const canRefund = String(status) === "VALID";
                    const from = orderValue(order, ["fromStation", "from_station", "fromStationName"]);
                    const to = orderValue(order, ["toStation", "to_station", "toStationName"]);
                    const carriage = orderValue(order, ["carriageNumber", "carriage_number"]);
                    const seat = orderValue(order, ["seatNumber", "seat_number"]);
                    return `
                        <tr>
                            <td>${id || ""}<br><small>${orderValue(order, ["orderNumber", "order_number"])}</small></td>
                            <td>${orderValue(order, ["trainNumber", "train_number"])}</td>
                            <td>${from} → ${to}</td>
                            <td>${orderValue(order, ["scheduleDate", "schedule_date"])}</td>
                            <td>${carriage}车 ${seat}</td>
                            <td>${orderValue(order, ["passengerName", "passenger_name"])}</td>
                            <td>${orderValue(order, ["ticketPrice", "ticket_price"])}</td>
                            <td>${normalizeOrderStatus(status)}</td>
                            <td>${canRefund ? `<button class="danger" type="button" data-refund-order="${id}">退票</button>` : ""}</td>
                        </tr>
                    `;
                }).join("")}
            </tbody>
        `;
    }

    async function refundOrder(orderId) {
        if (!orderId) return;
        if (!confirm(`确认退票 ${orderId}？`)) return;
        try {
            const data = await request(`/api/tickets/${encodeURIComponent(orderId)}`, {method: "DELETE"});
            const amount = data?.refundAmount !== undefined ? `，退款金额 ${data.refundAmount}` : "";
            setMessage($("#ordersMessage"), `退票成功${amount}`);
            await loadMyOrders(state.orders.page);
            if (state.selectedTrain) {
                await selectTrain(($("#trainTableWrap")._trains || []).indexOf(state.selectedTrain));
            }
        } catch (error) {
            setMessage($("#ordersMessage"), error.message, false);
        }
    }

    async function loadStatistic(type) {
        const paths = {
            route: "/api/statistics/window/route-ranking?limit=10",
            user: "/api/statistics/window/user-ranking?limit=10",
            trend: "/api/statistics/window/train-trend?days=30"
        };
        try {
            $("#apiState").textContent = "请求中";
            const rows = await request(paths[type]);
            renderGenericTable($("#statsTable"), rows || []);
            $("#apiState").textContent = "正常";
            setMessage($("#statsMessage"), "统计数据已更新");
        } catch (error) {
            $("#apiState").textContent = "失败";
            setMessage($("#statsMessage"), error.message, false);
        }
    }

    function renderUsers(rows) {
        const table = $("#userTable");
        if (!rows || rows.length === 0) {
            table.innerHTML = "<tbody><tr><td>暂无用户</td></tr></tbody>";
            return;
        }
        table.innerHTML = `
            <thead>
                <tr>
                    <th>ID</th><th>用户名</th><th>姓名</th><th>类型</th><th>状态</th><th>邮箱</th><th></th>
                </tr>
            </thead>
            <tbody>
                ${rows.map(user => `
                    <tr>
                        <td>${user.id ?? ""}</td>
                        <td>${user.username ?? ""}</td>
                        <td>${user.realName ?? ""}</td>
                        <td>${user.userType ?? ""}</td>
                        <td>${user.status === 1 ? "正常" : "禁用"}</td>
                        <td>${user.email ?? ""}</td>
                        <td><button class="danger" type="button" data-delete-user="${user.id}">删除</button></td>
                    </tr>
                `).join("")}
            </tbody>
        `;
    }

    // 管理员查询用户列表
    async function loadUsers(filters = {}) {
        const body = { ...filters };
        body.status = body.status === "" || body.status === undefined ? null : Number(body.status);
        const rows = await request("/api/users/list", { method: "POST", body: JSON.stringify(body) });
        renderUsers(rows || []);
        setMessage($("#userMessage"), "用户列表已更新");
    }

    // 加载数据库备份文件列表
    async function loadBackups() {
        const rows = await request("/api/admin/backups");
        const select = $("#backupSelect");
        select.innerHTML = (rows || []).map(item => {
            const name = item.fileName || item.name || item;
            return `<option value="${name}">${name}</option>`;
        }).join("");
        renderGenericTable($("#backupTable"), rows || []);
        setMessage($("#backupMessage"), "备份列表已更新");
    }

    // 左侧导航切换不同业务面板
    $$(".nav-button").forEach(button => {
        button.addEventListener("click", () => {
            const panelId = button.dataset.panel;
            $$(".nav-button").forEach(item => item.classList.remove("active"));
            $$(".panel").forEach(panel => panel.classList.remove("active"));
            button.classList.add("active");
            $(`#${panelId}`).classList.add("active");
            if (panelId === "ordersPanel") {
                loadMyOrders(1).catch(error => setMessage($("#ordersMessage"), error.message, false));
            }
        });
    });

    // 登录和注册表单切换
    $("[data-auth-view='loginSection']").addEventListener("click", () => switchAuthView("loginSection"));
    $("[data-auth-view='registerSection']").addEventListener("click", () => switchAuthView("registerSection"));

    function switchAuthView(viewId) {
        $$("[data-auth-view]").forEach(button => button.classList.toggle("active", button.dataset.authView === viewId));
        $("#loginSection").classList.toggle("hidden", viewId !== "loginSection");
        $("#registerSection").classList.toggle("hidden", viewId !== "registerSection");
        setMessage($("#accountMessage"), "");
    }

    $("#fromStationInput").addEventListener("input", event => {
        state.route.from = null;
        updateRouteBadge();
        debounceStationSearch("from", event.target.value);
    });

    $("#toStationInput").addEventListener("input", event => {
        state.route.to = null;
        updateRouteBadge();
        debounceStationSearch("to", event.target.value);
    });

    $("#fromSuggestions").addEventListener("click", event => {
        const button = event.target.closest(".suggestion");
        if (!button || button.dataset.index === undefined) return;
        selectStation("from", $("#fromSuggestions")._stations[Number(button.dataset.index)]);
    });

    $("#toSuggestions").addEventListener("click", event => {
        const button = event.target.closest(".suggestion");
        if (!button || button.dataset.index === undefined) return;
        selectStation("to", $("#toSuggestions")._stations[Number(button.dataset.index)]);
    });

    document.addEventListener("click", event => {
        if (!event.target.closest(".field")) {
            $("#fromSuggestions").classList.add("hidden");
            $("#toSuggestions").classList.add("hidden");
        }
    });

    $("#swapStations").addEventListener("click", () => {
        const previousFrom = state.route.from;
        state.route.from = state.route.to;
        state.route.to = previousFrom;
        $("#fromStationInput").value = state.route.from?.stationName || "";
        $("#toStationInput").value = state.route.to?.stationName || "";
        updateRouteBadge();
    });

    $("#trainSearchForm").addEventListener("submit", event => {
        event.preventDefault();
        searchTrains();
    });

    $("#trainTableWrap").addEventListener("click", event => {
        const selectButton = event.target.closest("[data-select-train]");
        const routeButton = event.target.closest("[data-route-train]");
        if (selectButton) {
            selectTrain(Number(selectButton.dataset.selectTrain));
            return;
        }
        if (routeButton) {
            const trains = $("#trainTableWrap")._trains || [];
            const train = trains[Number(routeButton.dataset.routeTrain)];
            if (train) loadRoute(train.trainId);
        }
    });

    $("#seatGrid").addEventListener("click", event => {
        const button = event.target.closest("[data-seat-index]");
        if (!button) return;
        selectSeat(Number(button.dataset.seatIndex));
    });

    $("#bookForm").addEventListener("submit", event => {
        event.preventDefault();
        submitBooking();
    });

    $("#clearBooking").addEventListener("click", () => {
        $("#bookForm").reset();
        $("#ticketPrice").value = "128.00";
        state.selectedSeat = null;
        $$(".seat").forEach(item => item.classList.remove("selected"));
        $("#selectedSeatText").value = "";
        $("#bookingState").textContent = "待提交";
        updateBookButton();
    });

    $("#loginForm").addEventListener("submit", async event => {
        event.preventDefault();
        try {
            const data = await request("/login", { method: "POST", body: JSON.stringify(formJson(event.target)) });
            persistLogin(data || {});
            await loadCurrentUserProfile();
            updateBookButton();
            if ($("#ordersPanel").classList.contains("active")) {
                await loadMyOrders(1);
            }
            setMessage($("#accountMessage"), "登录成功");
        } catch (error) {
            setMessage($("#accountMessage"), error.message, false);
        }
    });

    $("#refreshOrders").addEventListener("click", () => {
        loadMyOrders(1).catch(error => setMessage($("#ordersMessage"), error.message, false));
    });

    $("#prevOrders").addEventListener("click", () => {
        const page = Math.max(1, state.orders.page - 1);
        loadMyOrders(page).catch(error => setMessage($("#ordersMessage"), error.message, false));
    });

    $("#nextOrders").addEventListener("click", () => {
        const page = Math.min(state.orders.totalPages, state.orders.page + 1);
        loadMyOrders(page).catch(error => setMessage($("#ordersMessage"), error.message, false));
    });

    $("#orderPageSize").addEventListener("change", () => {
        loadMyOrders(1).catch(error => setMessage($("#ordersMessage"), error.message, false));
    });

    $("#orderStatusFilter").addEventListener("change", () => {
        loadMyOrders(1).catch(error => setMessage($("#ordersMessage"), error.message, false));
    });

    $("#ordersTable").addEventListener("click", event => {
        const button = event.target.closest("[data-refund-order]");
        if (!button) return;
        refundOrder(button.dataset.refundOrder);
    });

    $("#registerForm").addEventListener("submit", async event => {
        event.preventDefault();
        try {
            await request("/register", { method: "POST", body: JSON.stringify(formJson(event.target)) });
            event.target.reset();
            setMessage($("#accountMessage"), "注册成功");
            switchAuthView("loginSection");
        } catch (error) {
            setMessage($("#accountMessage"), error.message, false);
        }
    });

    $("#profileForm").addEventListener("submit", async event => {
        event.preventDefault();
        if (!state.id) {
            setMessage($("#accountMessage"), "请先登录", false);
            return;
        }
        try {
            const data = formJson(event.target);
            await request(`/api/users/update/${encodeURIComponent(state.id)}?${queryString(data)}`, { method: "POST" });
            if (data.username) {
                state.username = data.username;
                localStorage.setItem("username", data.username);
                updateSession();
            }
            await loadCurrentUserProfile();
            setMessage($("#accountMessage"), "信息已更新");
        } catch (error) {
            setMessage($("#accountMessage"), error.message, false);
        }
    });

    $("#quickLogout").addEventListener("click", logout);

    $("#deleteAccount").addEventListener("click", async () => {
        if (!state.id) {
            setMessage($("#accountMessage"), "请先登录", false);
            return;
        }
        const label = state.username ? `账号 ${state.username}` : "当前账号";
        if (!confirm(`确认注销${label}？该操作会删除账号信息。`)) {
            return;
        }
        try {
            await request(`/api/users/delete?id=${encodeURIComponent(state.id)}`, { method: "DELETE" });
            logout();
            setMessage($("#accountMessage"), "账号已注销");
        } catch (error) {
            setMessage($("#accountMessage"), error.message, false);
        }
    });

    $$("[data-stat]").forEach(button => {
        button.addEventListener("click", () => loadStatistic(button.dataset.stat));
    });

    $("#userSearchForm").addEventListener("submit", async event => {
        event.preventDefault();
        try {
            await loadUsers(formJson(event.target));
        } catch (error) {
            setMessage($("#userMessage"), error.message, false);
        }
    });

    $("#clearUserSearch").addEventListener("click", () => {
        $("#userSearchForm").reset();
        $("#userTable").innerHTML = "";
        setMessage($("#userMessage"), "筛选条件已清空");
    });

    $("#userTable").addEventListener("click", async event => {
        const button = event.target.closest("[data-delete-user]");
        if (!button) return;
        const id = button.dataset.deleteUser;
        if (!confirm(`确认删除用户 ${id}？`)) return;
        try {
            await request(`/api/users/delete?id=${encodeURIComponent(id)}`, { method: "DELETE" });
            await loadUsers(formJson($("#userSearchForm")));
            setMessage($("#userMessage"), "用户已删除");
        } catch (error) {
            setMessage($("#userMessage"), error.message, false);
        }
    });

    $("#createBackup").addEventListener("click", async () => {
        try {
            await request("/api/admin/backups", { method: "POST" });
            await loadBackups();
        } catch (error) {
            setMessage($("#backupMessage"), error.message, false);
        }
    });

    $("#loadBackups").addEventListener("click", () => {
        loadBackups().catch(error => setMessage($("#backupMessage"), error.message, false));
    });

    $("#restoreBackup").addEventListener("click", async () => {
        const fileName = $("#backupSelect").value;
        if (!fileName || !confirm(`确认恢复 ${fileName}？`)) return;
        try {
            const message = await request(`/api/admin/backups/${encodeURIComponent(fileName)}/restore`, { method: "POST" });
            setMessage($("#backupMessage"), message || "恢复完成");
        } catch (error) {
            setMessage($("#backupMessage"), error.message, false);
        }
    });

    $("#travelDate").value = today();
    updateSession();
    updateRouteBadge();
    updateBookButton();
    if (state.token) {
        loadCurrentUserProfile().catch(error => setMessage($("#accountMessage"), error.message, false));
    }
</script>
</body>
</html>
